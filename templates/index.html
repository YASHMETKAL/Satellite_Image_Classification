<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Image Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="box">
        <h1>Satellite Image Classifier</h1>
        <p class="sub">Upload an image to predict land type</p>

        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*" required class="file-input">
            <button type="submit">Upload &amp; Predict</button>
        </form>

        {% if error %}
            <p class="err">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
